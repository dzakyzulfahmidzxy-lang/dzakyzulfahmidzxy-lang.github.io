<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aozora Universe V2</title>
    
    <!-- 1. HUBUNGKAN KE FONT SAKTI JALAN PINTAS CDN -->
    <style>
        @font-face {
            font-family: 'MotoGP-Display';
            src: url('https://cdn.jsdelivr.net/gh/dzakyzulfahmidzxy-lang/font@main/MGPDisplay-BoldExpanded.otf') format('opentype');
            font-weight: bold;
        }
        @font-face {
            font-family: 'MotoGP-Text';
            src: url('https://cdn.jsdelivr.net/gh/dzakyzulfahmidzxy-lang/font@main/MGPText-Regular.ttf') format('truetype');
            font-weight: normal;
        }

        /* 2. PUSAT STYLING GLOBAL KAMU DI SINI */
        :root {
            --mgp-blue: #00b4d8;
            --mgp-dark: #111;
        }
        body {
            background-color: var(--mgp-dark);
            color: white;
            font-family: 'MotoGP-Text', sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            font-family: 'MotoGP-Display', sans-serif;
            color: var(--mgp-blue);
        }
    </style>
</head>
<body>

    <h1>AOZORA UNIVERSE V2</h1>
    <p>Selamat datang di rumah baru! Kali ini kodenya jauh lebih rapi.</p>
